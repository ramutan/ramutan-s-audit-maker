<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Audit Report Maker</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="server-icon active" title="Audit">A</div>
      <div class="server-icon" title="Reports">R</div>
      <div class="server-icon" title="Settings">S</div>
    </aside>

    <section class="main">
      <header class="header">
        <div class="header-left">
          <h1>Rambo's Audit Report Maker</h1>
          <span class="topic">Track your funds, expenses & savings</span>
        </div>
        <div class="funds-box">
          <label for="totalFunds">Total Funds (₱)</label>
          <input id="totalFunds" type="number" min="0" step="0.01" placeholder="0.00" />
          <button id="setFundsBtn" class="btn-primary">Set</button>
        </div>
      </header>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Total Funds</span>
          <span class="stat-value" id="statTotal">₱0.00</span>
        </div>
        <div class="stat">
          <span class="stat-label">Total Spent</span>
          <span class="stat-value spent" id="statSpent">₱0.00</span>
        </div>
        <div class="stat">
          <span class="stat-label">Remaining (Saved)</span>
          <span class="stat-value saved" id="statSaved">₱0.00</span>
        </div>
      </div>

      <form id="entryForm" class="entry-form">
        <input id="price" type="number" min="0" step="0.01" placeholder="Price (e.g. 50)" required />
        <input id="category" type="text" placeholder="Category (e.g. food)" required />
        <input id="note" type="text" placeholder="Note (optional)" />
        <button type="submit" class="btn-primary">Add Entry</button>
      </form>

      <div class="table-wrap">
        <table class="audit-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Date</th>
              <th>Category</th>
              <th>Note</th>
              <th class="right">Price</th>
              <th class="right">Remaining</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <p id="emptyState" class="empty">No entries yet. Add your first expense above.</p>
      </div>

      <footer class="footer">
        <button id="exportBtn" class="btn-ghost">Export CSV</button>
        <button id="clearBtn" class="btn-danger">Clear All</button>
      </footer>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
